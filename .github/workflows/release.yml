name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build
          mkdir -p ../server/web/dist
          cp -r dist/* ../server/web/dist/

      - name: Install arm64 cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build CLI (linux amd64 + arm64, CGO)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X main.version=$VERSION"

          echo "Building linux/amd64..."
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/cb-linux-amd64 .

          echo "Building linux/arm64..."
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/cb-linux-arm64 .

      - name: Build server (linux amd64 + arm64, CGO)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X main.version=$VERSION"

          echo "Building server linux/amd64..."
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/cb-server-linux-amd64 ./server/main.go

          echo "Building server linux/arm64..."
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/cb-server-linux-arm64 ./server/main.go

      - name: Package archives
        run: |
          cd dist
          tar -czf cb-linux-amd64.tar.gz cb-linux-amd64
          tar -czf cb-linux-arm64.tar.gz cb-linux-arm64
          tar -czf cb-server-linux-amd64.tar.gz cb-server-linux-amd64
          tar -czf cb-server-linux-arm64.tar.gz cb-server-linux-arm64

      - name: Build .deb package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          VERSION=$VERSION nfpm package -f packaging/linux/nfpm.yaml -p deb -t dist/

      - name: Upload archives
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/*.tar.gz

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb

      - name: Upload server binaries
        uses: actions/upload-artifact@v4
        with:
          name: server-binaries
          path: dist/cb-server-linux-*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build CLI (darwin amd64 + arm64, CGO)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X main.version=$VERSION"

          echo "Building darwin/amd64..."
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/cb-darwin-amd64 .

          echo "Building darwin/arm64..."
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -trimpath -ldflags "$LDFLAGS" -o dist/cb-darwin-arm64 .

      - name: Package
        run: |
          cd dist
          tar -czf cb-darwin-amd64.tar.gz cb-darwin-amd64
          tar -czf cb-darwin-arm64.tar.gz cb-darwin-arm64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build CLI (windows amd64, CGO)
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $ldflags = "-s -w -X main.version=$version"
          $env:CGO_ENABLED = "1"
          go build -trimpath -ldflags $ldflags -o dist\cb-windows-amd64.exe .

      - name: Package zip
        run: Compress-Archive -Path dist\cb-windows-amd64.exe -DestinationPath dist\cb-windows-amd64.zip

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version packaging\windows\cb.iss

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/CBSetup-amd64.exe

  docker:
    needs: build-linux
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download server binaries
        uses: actions/download-artifact@v4
        with:
          name: server-binaries
          path: dist/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/morolis/cb:${{ github.ref_name }}
            ghcr.io/morolis/cb:latest

  release:
    needs: [build-linux, build-macos, build-windows, docker]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect and checksum
        run: |
          mkdir release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          find artifacts -name '*.zip' -exec cp {} release/ \;
          find artifacts -name '*.deb' -exec cp {} release/ \;
          find artifacts -name '*.exe' -exec cp {} release/ \;
          cd release
          sha256sum *.tar.gz *.zip *.deb *.exe > checksums.txt
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
