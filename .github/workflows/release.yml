name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build
          mkdir -p ../server/web/dist
          cp -r dist/* ../server/web/dist/

      - name: Build CLI (all platforms)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X main.version=$VERSION"

          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS=${pair%/*}
            GOARCH=${pair#*/}
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            echo "Building $GOOS/$GOARCH..."
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build -trimpath -ldflags "$LDFLAGS" \
              -o "dist/cb-${GOOS}-${GOARCH}${EXT}" .
          done

      - name: Build server (amd64 + arm64)
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          LDFLAGS="-s -w -X main.version=$VERSION"
          for arch in amd64 arm64; do
            echo "Building server linux/$arch..."
            CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -trimpath -ldflags "$LDFLAGS" \
              -o dist/cb-server-linux-$arch ./server/main.go
          done

      - name: Package archives
        run: |
          cd dist
          for f in cb-linux-amd64 cb-linux-arm64 cb-darwin-amd64 cb-darwin-arm64; do
            tar -czf "${f}.tar.gz" "$f"
          done
          zip -q cb-windows-amd64.zip cb-windows-amd64.exe
          for arch in amd64 arm64; do
            tar -czf cb-server-linux-${arch}.tar.gz cb-server-linux-${arch}
          done

      - name: Build .deb package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          VERSION=$VERSION nfpm package -f packaging/linux/nfpm.yaml -p deb -t dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip *.deb > checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  windows-installer:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version packaging\windows\cb.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/CBSetup-amd64.exe

  docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download server binaries
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
          pattern: cb-server-linux-*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ghcr.io/morolis/cb:${{ github.ref_name }}
            ghcr.io/morolis/cb:latest

  release:
    needs: [build, windows-installer, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: artifacts/dist/

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: installer
          path: artifacts/installer/

      - name: Collect files
        run: |
          mkdir release
          cp artifacts/dist/*.tar.gz release/
          cp artifacts/dist/*.zip release/
          cp artifacts/dist/*.deb release/
          cp artifacts/dist/checksums.txt release/
          cp artifacts/installer/*.exe release/
          cd release
          sha256sum *.tar.gz *.zip *.deb *.exe > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
