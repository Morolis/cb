name: cb
arch: amd64
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: cb contributors
description: Cross-device clipboard for developers
license: Apache-2.0
homepage: https://github.com/Morolis/cb

contents:
  - src: ./dist/cb-linux-amd64
    dst: /usr/bin/cb
    file_info:
      mode: 0755

  - src: ./README.md
    dst: /usr/share/doc/cb/README.md
    file_info:
      mode: 0644

  - src: ./LICENSE
    dst: /usr/share/doc/cb/LICENSE
    file_info:
      mode: 0644
